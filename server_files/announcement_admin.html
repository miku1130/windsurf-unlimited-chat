<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公告管理 - 柠檬酱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 520px;
            margin: 20px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .header {
            padding: 20px 24px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: #fff7e6;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fa8c16;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        .header p {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }
        .form {
            padding: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #555;
            margin-bottom: 8px;
        }
        .form-group textarea {
            width: 100%;
            min-height: 100px;
            padding: 10px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group textarea:focus {
            border-color: #52c41a;
            box-shadow: 0 0 0 2px rgba(82,196,26,0.1);
        }
        .form-group input[type="password"] {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input[type="password"]:focus {
            border-color: #52c41a;
            box-shadow: 0 0 0 2px rgba(82,196,26,0.1);
        }
        .switch-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
        }
        .switch-label {
            font-size: 13px;
            color: #555;
        }
        .switch-label small {
            display: block;
            color: #999;
            font-size: 11px;
            margin-top: 2px;
        }
        /* 自定义开关 */
        .switch {
            position: relative;
            width: 40px;
            height: 22px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #ccc;
            border-radius: 22px;
            transition: 0.3s;
        }
        .slider:before {
            content: "";
            position: absolute;
            height: 18px;
            width: 18px;
            left: 2px;
            bottom: 2px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        .switch input:checked + .slider {
            background: #52c41a;
        }
        .switch input:checked + .slider:before {
            transform: translateX(18px);
        }
        .actions {
            display: flex;
            gap: 10px;
        }
        .btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .btn-primary {
            background: #52c41a;
            color: #fff;
        }
        .btn-primary:hover {
            background: #45a817;
        }
        .btn-primary:disabled {
            background: #b7eb8f;
            cursor: not-allowed;
        }
        .btn-danger {
            background: #fff;
            color: #ff4d4f;
            border: 1px solid #ff4d4f;
        }
        .btn-danger:hover {
            background: #fff2f0;
        }
        .status {
            margin-top: 16px;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            display: none;
        }
        .status.success {
            display: block;
            background: #f6ffed;
            color: #52c41a;
            border: 1px solid #b7eb8f;
        }
        .status.error {
            display: block;
            background: #fff2f0;
            color: #ff4d4f;
            border: 1px solid #ffccc7;
        }
        .current-info {
            margin-top: 12px;
            padding: 10px 14px;
            background: #fafafa;
            border-radius: 6px;
            font-size: 12px;
            color: #999;
        }
        .current-info span {
            color: #333;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <div>
                <h1>公告管理</h1>
                <p>编辑发布公告到 Windsurf无限对话 客户端</p>
            </div>
        </div>
        <div class="form">
            <!-- 管理密码 -->
            <div class="form-group">
                <label>管理密码</label>
                <input type="password" id="password" placeholder="请输入管理密码">
            </div>

            <!-- 公告内容 -->
            <div class="form-group">
                <label>公告内容</label>
                <textarea id="content" placeholder="请输入公告内容..."></textarea>
            </div>

            <!-- 公告开关 -->
            <div class="form-group">
                <div class="switch-row">
                    <div class="switch-label">
                        启用公告
                        <small>关闭后客户端不会显示公告</small>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="enabled">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <!-- 操作按钮 -->
            <div class="actions">
                <button class="btn btn-primary" id="saveBtn" onclick="saveAnnouncement()">保存并发布</button>
                <button class="btn btn-danger" id="clearBtn" onclick="clearAnnouncement()">清空公告</button>
            </div>

            <!-- 状态消息 -->
            <div class="status" id="statusMsg"></div>

            <!-- 当前公告信息 -->
            <div class="current-info" id="currentInfo">
                加载中...
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/announcement_api.php';

        // 页面加载时获取当前公告
        window.addEventListener('DOMContentLoaded', loadAnnouncement);

        async function loadAnnouncement() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                document.getElementById('content').value = data.content || '';
                document.getElementById('enabled').checked = data.enabled || false;
                updateCurrentInfo(data);
            } catch (e) {
                showStatus('error', '加载公告失败: ' + e.message);
            }
        }

        async function saveAnnouncement() {
            const password = document.getElementById('password').value;
            const content = document.getElementById('content').value;
            const enabled = document.getElementById('enabled').checked;
            
            if (!password) {
                showStatus('error', '请输入管理密码');
                return;
            }

            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.textContent = '保存中...';

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password, content, enabled }),
                });
                const data = await res.json();
                
                if (data.success) {
                    showStatus('success', '公告保存成功！');
                    updateCurrentInfo(data.data);
                } else {
                    showStatus('error', data.message || '保存失败');
                }
            } catch (e) {
                showStatus('error', '网络错误: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '保存并发布';
            }
        }

        async function clearAnnouncement() {
            const password = document.getElementById('password').value;
            if (!password) {
                showStatus('error', '请输入管理密码');
                return;
            }

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password, content: '', enabled: false }),
                });
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('content').value = '';
                    document.getElementById('enabled').checked = false;
                    showStatus('success', '公告已清空');
                    updateCurrentInfo(data.data);
                } else {
                    showStatus('error', data.message || '操作失败');
                }
            } catch (e) {
                showStatus('error', '网络错误: ' + e.message);
            }
        }

        function showStatus(type, message) {
            const el = document.getElementById('statusMsg');
            el.className = 'status ' + type;
            el.textContent = message;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 3000);
        }

        function updateCurrentInfo(data) {
            const el = document.getElementById('currentInfo');
            if (data.content) {
                el.innerHTML = `当前公告: <span>${data.content}</span><br>状态: <span>${data.enabled ? '已启用': '已关闭'}</span>${data.updated_at ? '<br>更新时间: <span>' + data.updated_at + '</span>' : ''}`;
            } else {
                el.innerHTML = '当前无公告';
            }
        }
    </script>
</body>
</html>
